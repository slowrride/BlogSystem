{% extends 'blog/base.html' %}
{% load crispy_forms_tags %}

{% block title %}编辑资料 - 个人博客{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3>编辑个人资料</h3>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary">保存修改</button>
                    <a href="{% url 'profile' username=request.user.username %}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
