{% extends 'blog/base.html' %}

{% block title %}{% if object %}编辑文章{% else %}发布文章{% endif %} - 个人博客{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header">
                <h3>{% if object %}编辑文章{% else %}发布文章{% endif %}</h3>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.title.id_for_label }}" class="form-label">文章标题</label>
                        {{ form.title }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.cover_image.id_for_label }}" class="form-label">封面图片（可选）</label>
                        {{ form.cover_image }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.content.id_for_label }}" class="form-label">文章内容</label>
                        {{ form.content }}
                        <small class="form-text text-muted">支持纯文本格式</small>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        {% if object %}更新文章{% else %}发布文章{% endif %}
                    </button>
                    <a href="{% if object %}{% url 'post_detail' object.id %}{% else %}{% url 'post_list' %}{% endif %}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
