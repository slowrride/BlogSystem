{% extends 'blog/base.html' %}

{% block title %}删除文章 - 个人博客{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3>确认删除文章</h3>
            </div>
            <div class="card-body">
                <p>您确定要删除文章 "{{ object.title }}" 吗？</p>
                <p class="text-danger">此操作不可撤销！</p>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">确认删除</button>
                    <a href="{% url 'post_detail' object.id %}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
